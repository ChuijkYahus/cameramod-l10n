name: Report Bug
description: Found a bug? Report it.
title: "[🐞]: "
labels: "bug"
body:
  - type: markdown
    attributes:
      value: |
        BUG

  - type: checkboxes
    id: pre-report-bug
    attributes:
      label: "Before Continuing:"
      options:
        - label: "Check you are using the latest version of the mods and its dependencies"
          required: true
        - label: "Always include a latest.log if you are crashing"
          required: true
        - label: "Remove Optifine, there is no reason for anybody to use that. Also try disabling mods that alter rendering or fundamentally change big aspect of the game (Sodium, Lithium, Vulkan...)"
          required: true
        - label: "If you are unsure which mod is the culprit.\nDisable half your mods until the culprit is found."
          required: true
        - label: "Confirm that there is no existing issue with a similar description submitted in the list of issues."
          required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: The Version of Minecraft?
      options:
        - 1.21.1-NEOFORGE
        - 1.21.1-FABRIC
        - 1.20.1-FORGE
        - 1.20.1-FABRIC
        - 1.19.2-FORGE
        - 1.19.2-FABRIC
        - 1.18.2-FORGE
      default: 0
    validations:
      required: true

  - type: input
    id: mod
    attributes:
      label: Mod Version
      description: The current version of the mod
      placeholder: ex. 1.20-1.0.0
    validations:
      required: true
     

  - type: textarea
    id: issue-details
    attributes:
      label: "Issue Detail"
      description: "A clear and concise description of what the bug is."
      placeholder: "TIP: Always include A log if the issue is causing a crash. These are found in your instance directory under /logs. \nTIP: If applicable, add screenshots to help explain your problem."
    validations:
        required: true
