modLoader = "javafml"
loaderVersion = "*"

license = "${mod_license}"
issueTrackerURL = "${mod_github}/issues"

[[mixins]]
config = "${mod_id}.mixins.json"
[[mixins]]
config = "${mod_id}-common.mixins.json"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "icon.png"
authors = "${mod_authors}"
credits = "${mod_credits}"
description = '''${mod_description}'''
modUrl = "${mod_homepage}"

[[dependencies.${ mod_id }]]
    modId = "neoforge"
    type = "required"
    versionRange = "*"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${ mod_id }]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${ mod_id }]]
    modId = "moonlight"
    mandatory = true
    type = "required"
    versionRange = "[${moonlight_min_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${ mod_id }]]
    modId = "watermedia"
    type = "optional"
    versionRange = "[,3.0.0)"
    ordering = "NONE"
    side = "CLIENT"

[[dependencies.${ mod_id }]]
    modId = "vista-aeronautics-fix"
    type = "incompatible"
    versionRange = "(,1.0.1]"
    ordering = "NONE"
    side = "BOTH"


